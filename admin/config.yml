backend:
  name: git-gateway
  branch: master

# 本地开发模式
local_backend: false

# 媒体文件存储
media_folder: "images/products"
public_folder: "/images/products"

# 网站信息
site_url: https://hemanja.github.io/ycsleeve.github.io/
display_url: https://hemanja.github.io/ycsleeve.github.io/
logo_url: /images/logo.png

# 语言设置
locale: "zh_Hans"

# 产品集合
collections:
  # 玻璃纤维套管系列
  - name: "fiberglass"
    label: "玻璃纤维套管"
    label_singular: "产品"
    folder: "products"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "产品名称", name: "title", widget: "string", required: true }
      - { label: "英文名称", name: "title_en", widget: "string", required: true }
      - { label: "产品类型", name: "category", widget: "select", options: ["4KV内纤外胶", "1500V硅树脂", "内胶外纤", "黄腊管", "定纹管", "耐高温密封管", "电子烟专用管", "其他"], default: "其他" }
      - { label: "主图", name: "main_image", widget: "image", required: true }
      - { label: "产品图片", name: "images", widget: "list", field: { label: "图片", name: "image", widget: "image" } }
      - { label: "简短描述", name: "description", widget: "text", required: true }
      - { label: "产品特点标签", name: "tags", widget: "list", default: ["高品质", "专业制造"] }
      - label: "技术参数"
        name: "specs"
        widget: "list"
        fields:
          - { label: "参数名", name: "param_name", widget: "string" }
          - { label: "参数值", name: "param_value", widget: "string" }
      - { label: "应用领域", name: "applications", widget: "list" }
      - { label: "产品内容", name: "body", widget: "markdown" }

  # 热缩管系列
  - name: "heatshrink"
    label: "热缩管系列"
    label_singular: "产品"
    folder: "products/heatshrink"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "产品名称", name: "title", widget: "string" }
      - { label: "英文名称", name: "title_en", widget: "string" }
      - { label: "产品类型", name: "category", widget: "select", options: ["单壁热缩管", "双壁热缩管", "带胶热缩管", "中壁热缩管", "母排热缩管", "其他"] }
      - { label: "主图", name: "main_image", widget: "image" }
      - { label: "简短描述", name: "description", widget: "text" }
      - label: "技术参数"
        name: "specs"
        widget: "list"
        fields:
          - { label: "参数名", name: "param_name", widget: "string" }
          - { label: "参数值", name: "param_value", widget: "string" }
      - { label: "应用领域", name: "applications", widget: "list" }

  # 其他产品系列
  - name: "other-products"
    label: "其他产品"
    label_singular: "产品"
    folder: "products/others"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "产品名称", name: "title", widget: "string" }
      - { label: "英文名称", name: "title_en", widget: "string" }
      - { label: "产品类型", name: "category", widget: "select", options: ["波纹管", "硅胶管", "PVC管", "其他"] }
      - { label: "主图", name: "main_image", widget: "image" }
      - { label: "简短描述", name: "description", widget: "text" }
      - label: "技术参数"
        name: "specs"
        widget: "list"
        fields:
          - { label: "参数名", name: "param_name", widget: "string" }
          - { label: "参数值", name: "param_value", widget: "string" }

  # 网站设置
  - name: "settings"
    label: "网站设置"
    files:
      - name: "general"
        label: "基本信息"
        file: "_data/settings.json"
        fields:
          - { label: "公司名称", name: "company_name", widget: "string", default: "佛山盈灿绝缘材料" }
          - { label: "品牌名称", name: "brand_name", widget: "string", default: "YC INSULATION" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string", default: "+86 135 9060 5550" }
          - { label: "邮箱", name: "email", widget: "string", default: "heman508@gmail.com" }
          - { label: "地址", name: "address", widget: "text" }
