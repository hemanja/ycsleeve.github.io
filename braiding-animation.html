<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纱线编织套管动画演示 - YC INSULATION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #f39c12;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        /* 编织动画容器 */
        .braiding-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 500px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Canvas 层 */
        #braidingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 叠加文字 */
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .overlay-text h2 {
            color: #fff;
            font-size: 3rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .overlay-text p {
            color: #f39c12;
            font-size: 1.5rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* 控制面板 */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .control-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 说明文字 */
        .description {
            margin-top: 40px;
            max-width: 800px;
            color: rgba(255,255,255,0.7);
            text-align: center;
            line-height: 1.8;
            padding: 0 20px;
        }

        /* 纱线颜色选择器 */
        .color-picker {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .color-option:hover, .color-option.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        .color-white { background: #fff; }
        .color-gold { background: #f39c12; }
        .color-red { background: #e74c3c; }
        .color-blue { background: #3498db; }
        .color-green { background: #2ecc71; }
    </style>
</head>
<body>
    <h1>🧵 纱线编织套管动画</h1>
    <p class="subtitle">Fiberglass Sleeve Braiding Animation</p>

    <div class="braiding-container">
        <canvas id="braidingCanvas"></canvas>
        <div class="overlay-text">
            <h2>YC INSULATION</h2>
            <p>18年专注玻璃纤维套管制造</p>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn primary" onclick="toggleAnimation()">暂停/播放</button>
        <button class="control-btn secondary" onclick="changeSpeed(0.5)">慢速</button>
        <button class="control-btn secondary" onclick="changeSpeed(1)">正常</button>
        <button class="control-btn secondary" onclick="changeSpeed(2)">快速</button>
        <button class="control-btn secondary" onclick="toggleReverse()">反向编织</button>
    </div>

    <div class="color-picker">
        <div class="color-option color-white active" data-color="#ffffff" onclick="setYarnColor(this)"></div>
        <div class="color-option color-gold" data-color="#f39c12" onclick="setYarnColor(this)"></div>
        <div class="color-option color-red" data-color="#e74c3c" onclick="setYarnColor(this)"></div>
        <div class="color-option color-blue" data-color="#3498db" onclick="setYarnColor(this)"></div>
        <div class="color-option color-green" data-color="#2ecc71" onclick="setYarnColor(this)"></div>
    </div>

    <div class="description">
        <p>这个动画模拟了玻璃纤维套管的编织过程。纱线在高速编织机上交错编织，形成紧密的保护套管。</p>
        <p>可用于网站首页背景，展示生产工艺的专业性。</p>
    </div>

    <script>
        const canvas = document.getElementById('braidingCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let animationId;
        let isPlaying = true;
        let speedMultiplier = 1;
        let isReversed = false;
        let yarnColor = '#ffffff';

        // 编织参数
        const YARN_COUNT = 24; // 纱线数量
        const LAYERS = 12; // 编织层数
        let yarns = [];
        let time = 0;

        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
            initYarns();
        }

        function initYarns() {
            yarns = [];
            const centerX = width / 2;
            const centerY = height / 2;
            const radiusX = Math.min(width, height) * 0.35;
            const radiusY = radiusX * 0.6;

            for (let i = 0; i < YARN_COUNT; i++) {
                const angle = (i / YARN_COUNT) * Math.PI * 2;
                const layer = Math.floor(i / 2);
                const isEven = i % 2 === 0;

                yarns.push({
                    angle: angle,
                    baseAngle: angle,
                    layer: layer,
                    direction: isEven ? 1 : -1,
                    speed: 0.02 + Math.random() * 0.01,
                    radiusX: radiusX,
                    radiusY: radiusY,
                    thickness: 2 + Math.random() * 2,
                    phase: Math.random() * Math.PI * 2,
                    history: []
                });
            }
        }

        function drawYarn(yarn, time) {
            const centerX = width / 2;
            const centerY = height / 2;
            const direction = isReversed ? -yarn.direction : yarn.direction;
            const currentAngle = yarn.baseAngle + time * yarn.speed * direction * speedMultiplier;

            // 创建编织效果 - 上下交错
            const weave = Math.sin(currentAngle * LAYERS + yarn.phase) * 20;
            
            // 螺旋下降效果
            const spiralOffset = (time * 0.05 * speedMultiplier) % 1;
            const yPosition = (yarn.angle / (Math.PI * 2) + spiralOffset) % 1;

            // 计算位置
            const x = centerX + Math.cos(currentAngle) * yarn.radiusX;
            const y = centerY + Math.sin(currentAngle) * yarn.radiusY * 0.3 + weave;

            // 保存历史位置用于绘制轨迹
            yarn.history.push({ x, y, alpha: 1 });
            if (yarn.history.length > 100) {
                yarn.history.shift();
            }

            // 绘制纱线轨迹
            if (yarn.history.length > 1) {
                ctx.beginPath();
                ctx.moveTo(yarn.history[0].x, yarn.history[0].y);

                for (let i = 1; i < yarn.history.length; i++) {
                    const point = yarn.history[i];
                    ctx.lineTo(point.x, point.y);
                }

                // 渐变效果
                const gradient = ctx.createLinearGradient(
                    yarn.history[0].x, yarn.history[0].y,
                    x, y
                );
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(1, yarnColor);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = yarn.thickness;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // 绘制纱线头部发光点
            ctx.beginPath();
            ctx.arc(x, y, yarn.thickness + 2, 0, Math.PI * 2);
            ctx.fillStyle = yarnColor;
            ctx.shadowColor = yarnColor;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawSleeve() {
            const centerX = width / 2;
            const centerY = height / 2;
            const radiusX = Math.min(width, height) * 0.25;
            const radiusY = radiusX * 0.4;

            // 绘制套管轮廓（半透明）
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 40;
            ctx.stroke();

            // 添加编织纹理
            for (let i = 0; i < 360; i += 10) {
                const angle = (i * Math.PI / 180) + time * 0.01;
                const x1 = centerX + Math.cos(angle) * (radiusX - 15);
                const y1 = centerY + Math.sin(angle) * (radiusY - 6);
                const x2 = centerX + Math.cos(angle) * (radiusX + 15);
                const y2 = centerY + Math.sin(angle) * (radiusY + 6);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(255,255,255,${0.05 + Math.sin(angle + time) * 0.03})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 绘制套管底图
            drawSleeve();

            // 绘制所有纱线
            yarns.forEach(yarn => drawYarn(yarn, time));

            time += 0.016;

            if (isPlaying) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function toggleAnimation() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function changeSpeed(speed) {
            speedMultiplier = speed;
        }

        function toggleReverse() {
            isReversed = !isReversed;
        }

        function setYarnColor(element) {
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            yarnColor = element.dataset.color;
        }

        // 初始化
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
