<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8a50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#grad)"/>
  
  <!-- YC 文字 -->
  <text x="32" y="42" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="900" 
        fill="white" 
        text-anchor="middle">YC</text>
</svg>
